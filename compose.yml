services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: eventpipeline
      POSTGRES_USER: eventpipeline
      POSTGRES_PASSWORD: eventpipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventpipeline -d eventpipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/eventpipeline
      DB_USERNAME: eventpipeline
      DB_PASSWORD: eventpipeline
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.6.1
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  postgres_data:
  grafana_data:
